<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ValszamVizsgaHelper — Valószínűségszámítás vizsga segédlet | Óbudai Egyetem NIK</title>
<meta name="description" content="ValszamVizsgaHelper: interaktív valószínűségszámítás és matematikai statisztika vizsga feladatfelismerő és segédlet az Óbudai Egyetem Neumann János Informatikai Kar (OE NIK) hallgatóinak. Eloszlások, hipotézisvizsgálat, kvíz és kritikus értékek.">
<meta name="keywords" content="valószínűségszámítás, matematikai statisztika, valszám vizsga, valszám segédlet, valszám feladatok, Óbudai Egyetem, OE, NIK, Neumann János Informatikai Kar, mérnökinformatikus, vizsga felkészülés, eloszlások, hipotézisvizsgálat, Poisson, binomiális, normális eloszlás, t-próba, u-próba">
<meta name="author" content="ValszamVizsgaHelper">
<meta property="og:title" content="ValszamVizsgaHelper — Valószínűségszámítás vizsga segédlet | Óbudai Egyetem NIK">
<meta property="og:description" content="Interaktív valszám feladatfelismerő és vizsga segédlet az Óbudai Egyetem Neumann János Informatikai Kar (OE NIK) hallgatóinak.">
<meta property="og:type" content="website">
<meta property="og:locale" content="hu_HU">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
:root{--bg:#fff;--bg2:#f4f5f7;--bg3:#eceef1;--text:#1a1a1a;--text2:#606878;--border:#dde0e7;--modal-ov:rgba(0,0,0,.45)}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]){--bg:#0f1117;--bg2:#181c24;--bg3:#1e2330;--text:#dce0eb;--text2:#7a8499;--border:#272d3d;--modal-ov:rgba(0,0,0,.7)}}
:root[data-theme="dark"]{--bg:#0f1117;--bg2:#181c24;--bg3:#1e2330;--text:#dce0eb;--text2:#7a8499;--border:#272d3d;--modal-ov:rgba(0,0,0,.7)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;background:var(--bg);color:var(--text);font-size:13px}

/* ── Theme toggle ── */
.theme-tog{margin-left:auto;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:14px;font-weight:600;transition:all .15s;user-select:none;line-height:1}
.theme-tog:hover{color:var(--text);border-color:var(--text2)}
.gh-link{display:inline-flex;align-items:center;margin-left:6px;color:var(--text2);opacity:.35;transition:opacity .15s,color .15s}
.gh-link:hover{opacity:1;color:var(--text)}
.gh-link svg{width:16px;height:16px;display:block}

/* ── Tabs ── */
.tabs{display:flex;flex-wrap:wrap;gap:4px;padding:10px 12px 0}
.tab{padding:6px 16px;border-radius:8px 8px 0 0;border:1px solid var(--border);border-bottom:none;background:var(--bg2);color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;user-select:none}
.tab.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.pane{display:none;padding:12px;border-top:2px solid var(--text)}
.pane.active{display:block}

/* ── Category ── */
.cat{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text2);margin:14px 0 6px;padding-left:2px}
.cat:first-child{margin-top:0}

/* ── Quick grid ── */
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.qcard{border-radius:8px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .12s,box-shadow .12s}
.qcard:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.13)}
.qcard:active{transform:translateY(0)}
.qhead{display:flex;align-items:center;gap:8px;padding:7px 10px;font-size:12px;font-weight:600}
.qbody{padding:7px 10px 9px;background:var(--bg)}
.kwr{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.kw{font-size:11px;font-weight:500;padding:2px 7px;border-radius:12px}
.trap{font-size:11px;color:var(--text2);line-height:1.45}
.trap b,.trap strong{color:var(--text)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hint{font-size:10px;color:var(--text2);text-align:right;margin-top:8px;opacity:.7}

/* ── Modal ── */
.modal{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;pointer-events:none;opacity:0;transition:opacity .18s}
.modal.open{opacity:1;pointer-events:auto}
.mbd{position:absolute;inset:0;background:var(--modal-ov);backdrop-filter:blur(3px);cursor:pointer}
.mbox{position:relative;background:var(--bg);border:1px solid var(--border);border-radius:12px;width:100%;max-width:700px;max-height:88vh;overflow-y:auto;z-index:1;transform:scale(.95) translateY(8px);transition:transform .18s}
.modal.open .mbox{transform:scale(1) translateY(0)}
.modal-close{position:sticky;float:right;top:10px;right:10px;margin-right:10px;background:var(--bg2);border:1px solid var(--border);border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:center;z-index:2;flex-shrink:0}
.modal-close:hover{color:var(--text);background:var(--bg3)}
.mhead{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;font-size:15px;font-weight:600;border-radius:12px 12px 0 0;position:sticky;top:0;z-index:1;border-bottom:1px solid var(--border)}
.mhead .dot{width:12px;height:12px}
.mbody{padding:14px 16px 20px}

/* ── Detail sections ── */
.ds{margin-bottom:13px}
.ds:last-child{margin-bottom:0}
.dl{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text2);margin-bottom:4px}
.dc{font-size:12.5px;line-height:1.55;color:var(--text)}
.d2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px}

/* ── Formula block ── */
.fblock{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;margin-top:4px}
.frow{padding:5px 0;border-bottom:1px solid var(--border)}
.frow:last-child{border-bottom:none}
.flabel{font-size:10px;color:var(--text2);margin-bottom:1px;line-height:1.3}
.fmath{font-size:.92em}
.katex-display{margin:.1em 0!important;text-align:left!important}
.katex-display>.katex{text-align:left!important}
.katex{font-size:1em}

/* ── Buktatók ── */
.blist{list-style:none;padding:0}
.blist li{font-size:12px;line-height:1.45;padding:3px 0 3px 18px;position:relative}
.blist li::before{content:"⚠️";position:absolute;left:0;top:4px;font-size:10px}

/* ── Hook ── */
.hook{font-size:12px;font-weight:600;font-style:italic;padding:7px 10px;background:var(--bg2);border-radius:6px;border-left:3px solid;line-height:1.45;margin-top:4px}

/* ── Vizsga-fontosság badge ── */
.pri{font-size:11px;letter-spacing:1.5px;white-space:nowrap}
.pri-3{color:#e0a500}
.pri-2{color:#c0922f}
.pri-1{color:var(--text2);opacity:.7}

/* ── Tanulási út ── */
.lp-lead{font-size:14px;font-weight:700;line-height:1.5;padding:12px 14px;background:var(--bg2);border-radius:10px;border-left:4px solid #e0a500;margin-bottom:14px}
.lp-h{font-size:13px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--text2);margin:18px 0 8px;display:flex;align-items:center;gap:7px}
.lp-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.lp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.lp-fam{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 13px}
.lp-fam b{display:block;font-size:13px;margin-bottom:4px}
.lp-fam span{font-size:11.5px;color:var(--text2);line-height:1.5}
.lp-step{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.lp-step:last-child{border-bottom:none}
.lp-num{flex:0 0 24px;height:24px;border-radius:50%;background:#e0a500;color:#1a1a1a;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center}
.lp-step div{font-size:12.5px;line-height:1.5}
.lp-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:4px}
.lp-tbl th,.lp-tbl td{padding:6px 9px;border:1px solid var(--border);text-align:left;vertical-align:top;line-height:1.45}
.lp-tbl th{background:var(--bg3);font-weight:700}
.lp-btn{display:inline-block;margin-top:6px;padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:11.5px;font-weight:600;cursor:pointer}
.lp-btn:hover{border-color:var(--text2)}
.lp-bar{height:10px;border-radius:6px;background:var(--bg3);overflow:hidden;margin:6px 0 4px}
.lp-bar i{display:block;height:100%;background:linear-gradient(90deg,#7BAE24,#1D9E75);transition:width .3s}
.lp-prog{font-size:12px;font-weight:700;color:var(--text2)}
.lp-row{display:flex;align-items:center;gap:9px;padding:7px 9px;border:1px solid var(--border);border-radius:8px;margin-bottom:5px;background:var(--bg2)}
.lp-row.done{opacity:.62}
.lp-row.done .lp-name{text-decoration:line-through}
.lp-row input{width:17px;height:17px;flex:0 0 auto;cursor:pointer;accent-color:#1D9E75}
.lp-name{flex:1;font-size:12.5px;font-weight:600;cursor:pointer}
.lp-name:hover{color:var(--text2)}
.lp-row .pri{flex:0 0 auto}
.lp-cue{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;transition:background .12s;flex-wrap:wrap}
.lp-cue:hover{background:var(--bg3)}
.lp-cue-kw{font-size:12px;font-style:italic;color:var(--text);flex:1 1 50%;min-width:140px}
.lp-cue-arr{color:var(--text2);font-weight:700;flex:0 0 auto}
.lp-cue-t{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;flex:1 1 40%;min-width:120px}
.lp-cue-t .dot{width:8px;height:8px;flex:0 0 auto}

/* ── Paraméterek ── */
.ptable{width:100%;border-collapse:collapse;margin-top:4px;font-size:11.5px}
.ptable td{padding:3px 6px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.4}
.ptable tr:last-child td{border-bottom:none}
.ptable .psym{font-family:'Courier New',monospace;font-size:12px;font-weight:600;white-space:nowrap;width:1%;padding-right:10px}
.ptable .pdesc{color:var(--text2)}

/* ── Accordion ── */
.aitm{border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden}
.ahead{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;user-select:none;font-size:13px;font-weight:600;transition:filter .15s}
.ahead:hover{filter:brightness(.96)}
.chv{margin-left:auto;font-size:10px;color:var(--text2);transition:transform .2s}
.aitm.open .chv{transform:rotate(90deg)}
.abody{display:none;padding:12px 14px 14px;border-top:1px solid var(--border);background:var(--bg2)}
.aitm.open .abody{display:block}

/* ── Kereső ── */
.search{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:9px;background:var(--bg2);color:var(--text);font-size:13px;margin-bottom:12px}
.search:focus{outline:none;border-color:var(--text2)}
.search::placeholder{color:var(--text2);opacity:.8}
.catgrp:not(:first-child){margin-top:14px}

/* ── Döntési fa (felismerő) ── */
.tree{max-width:640px;margin:0 auto}
.tctrl{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.tbtn{padding:5px 12px;border:1px solid var(--border);border-radius:7px;background:var(--bg2);color:var(--text2);cursor:pointer;font-size:11px;font-weight:600}
.tbtn:hover{color:var(--text);background:var(--bg3)}
.tcrumb{font-size:11px;color:var(--text2);flex:1;min-width:120px;line-height:1.4}
.tq{font-size:15px;font-weight:700;margin:4px 0 13px;line-height:1.4}
.topt{display:block;width:100%;text-align:left;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);border-radius:9px;background:var(--bg2);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;line-height:1.45;transition:transform .12s,border-color .12s}
.topt:hover{border-color:var(--text2);transform:translateX(3px)}
.tres{border:1px solid var(--border);border-radius:11px;overflow:hidden}
.tres .rhead{display:flex;align-items:center;gap:10px;padding:13px 16px;font-size:16px;font-weight:700}
.tres .rbody{padding:13px 16px;background:var(--bg)}
.rbtns{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}
.rbtn{padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600}
.rbtn-go{background:var(--text);color:var(--bg)}
.rbtn-re{background:var(--bg2);color:var(--text2);border:1px solid var(--border)}

/* ── Összetéveszthető párok ── */
.ptitle{font-size:12px;color:var(--text2);margin-bottom:13px;line-height:1.5}
.pair{border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:12px;background:var(--bg2)}
.ptit{font-size:14px;font-weight:700;margin-bottom:11px}
.pcols{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:stretch}
.pcol{border-radius:9px;padding:10px 12px}
.pname{font-size:12.5px;font-weight:700;margin-bottom:5px}
.pq{font-size:11.5px;line-height:1.45}
.pvs{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2)}
.pkey{font-size:11.5px;line-height:1.5;margin-top:11px;padding:8px 11px;background:var(--bg3);border-radius:7px}
.plinks{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
.plink{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:11px;font-weight:600}
.plink:hover{background:var(--bg3)}

/* ── Kvíz ── */
.quiz{max-width:640px;margin:0 auto}
.qztop{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.qzprog{font-size:11px;color:var(--text2);font-weight:600}
.qzscore{margin-left:auto;font-size:12px;font-weight:700}
.qzq{border:1px solid var(--border);border-radius:11px;padding:14px 16px;background:var(--bg2);font-size:13.5px;line-height:1.55;margin-bottom:13px}
.qzlabel{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text2);margin-bottom:6px}
.qzopt{display:block;width:100%;text-align:left;padding:11px 14px;margin-bottom:7px;border:1px solid var(--border);border-radius:9px;background:var(--bg);color:var(--text);cursor:pointer;font-size:13px;font-weight:600;line-height:1.4;transition:transform .12s,border-color .12s}
.qzopt:hover:not(:disabled){border-color:var(--text2);transform:translateX(3px)}
.qzopt:disabled{cursor:default}
.qzopt.ok{background:#1d9e7522;border-color:#1D9E75}
.qzopt.bad{background:#c0302022;border-color:#C03020}
.qzfb{border-radius:9px;padding:11px 14px;margin-top:11px;font-size:12.5px;line-height:1.5}
.qzfb.good{background:#1d9e7518;border:1px solid #1D9E75}
.qzfb.wrong{background:#c0302018;border:1px solid #C03020}
.qzbtns{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
.qzdone{text-align:center;padding:34px 16px}
.qzdone .big{font-size:34px;font-weight:800;margin:10px 0}

/* ── Táblázatok ── */
.tbl-sec{margin-bottom:18px;max-width:560px}
.tbl-h{font-size:12.5px;font-weight:700;margin-bottom:7px}
.tbl-note{font-size:11px;color:var(--text2);margin-bottom:8px;line-height:1.5}
.rtbl{width:100%;border-collapse:collapse;font-size:12px}
.rtbl th,.rtbl td{padding:5px 8px;border:1px solid var(--border);text-align:center}
.rtbl th{background:var(--bg2);font-weight:700;color:var(--text2)}
.rtbl td.k{font-family:'Courier New',monospace;font-weight:600}
.rtbl td.hl{background:var(--bg3);font-weight:700}

/* ── Color palette ─────────────────────────────────────────────────────────── */
/* teal=Bin blue=Poi green=Geo lime=Hyp
   amber=Uni rose=Exp coral=Nor red=dens
   purple=CI violet=HT indigo=Bay slate=CM gray=CLT */
.c-teal  {background:#E1F5EE}.c-teal   .dot,.c-teal.dot  {background:#1D9E75}.c-teal  .kw{background:#9FE1CB;color:#085041}
.c-blue  {background:#E6F1FB}.c-blue   .dot,.c-blue.dot  {background:#378ADD}.c-blue  .kw{background:#B5D4F4;color:#0C447C}
.c-green {background:#EAF3DE}.c-green  .dot,.c-green.dot {background:#639922}.c-green .kw{background:#C0DD97;color:#173404}
.c-lime  {background:#F0F8E0}.c-lime   .dot,.c-lime.dot  {background:#7BAE24}.c-lime  .kw{background:#CBEA8B;color:#2A4A00}
.c-amber {background:#FAEEDA}.c-amber  .dot,.c-amber.dot {background:#BA7517}.c-amber .kw{background:#FAC775;color:#633806}
.c-rose  {background:#FDE8EC}.c-rose   .dot,.c-rose.dot  {background:#D94060}.c-rose  .kw{background:#F5B0C0;color:#6B0020}
.c-coral {background:#FAECE7}.c-coral  .dot,.c-coral.dot {background:#D85A30}.c-coral .kw{background:#F5C4B3;color:#4A1B0C}
.c-red   {background:#FDE8E4}.c-red    .dot,.c-red.dot   {background:#C03020}.c-red   .kw{background:#F4B4A8;color:#580A00}
.c-purple{background:#EEEDFE}.c-purple .dot,.c-purple.dot{background:#7F77DD}.c-purple.kw{background:#CECBF6;color:#26215C}
.c-violet{background:#F2EFFE}.c-violet .dot,.c-violet.dot{background:#9060CC}.c-violet.kw{background:#CEBFF4;color:#2A1060}
.c-indigo{background:#EBF0FD}.c-indigo .dot,.c-indigo.dot{background:#3D5DB0}.c-indigo.kw{background:#B4C6F0;color:#142060}
.c-slate {background:#EEEEF2}.c-slate  .dot,.c-slate.dot {background:#6672A0}.c-slate .kw{background:#C0C6DC;color:#1E2A50}
.c-gray  {background:#F1EFE8}.c-gray   .dot,.c-gray.dot  {background:#888780}.c-gray  .kw{background:#D3D1C7;color:#2C2C2A}

@media(prefers-color-scheme:dark){
  .c-teal  {background:#08504130}.c-teal  .kw{background:#085041;color:#9FE1CB}
  .c-blue  {background:#0c447c30}.c-blue  .kw{background:#0C447C;color:#B5D4F4}
  .c-green {background:#17340430}.c-green .kw{background:#27500A;color:#C0DD97}
  .c-lime  {background:#2a4a0030}.c-lime  .kw{background:#3A6010;color:#CBEA8B}
  .c-amber {background:#63380630}.c-amber .kw{background:#633806;color:#FAC775}
  .c-rose  {background:#6b002030}.c-rose  .kw{background:#8B1030;color:#F5B0C0}
  .c-coral {background:#4a1b0c30}.c-coral .kw{background:#712B13;color:#F5C4B3}
  .c-red   {background:#58000030}.c-red   .kw{background:#6A1008;color:#F4B4A8}
  .c-purple{background:#26215c30}.c-purple.kw{background:#3C3489;color:#CECBF6}
  .c-violet{background:#2a106030}.c-violet.kw{background:#503080;color:#CEBFF4}
  .c-indigo{background:#14206030}.c-indigo.kw{background:#243878;color:#B4C6F0}
  .c-slate {background:#1e2a5030}.c-slate .kw{background:#3A4468;color:#C0C6DC}
  .c-gray  {background:#2c2c2a30}.c-gray  .kw{background:#444441;color:#D3D1C7}
  .qbody,.fblock,.ahead:hover,.hook{background:var(--bg3)}
  .abody{background:var(--bg2)}
  .mhead{background:var(--bg2)}
}
/* Kézi sötét mód (felülírja a világos rendszer-beállítást) */
:root[data-theme="dark"] .c-teal  {background:#08504130}:root[data-theme="dark"] .c-teal  .kw{background:#085041;color:#9FE1CB}
:root[data-theme="dark"] .c-blue  {background:#0c447c30}:root[data-theme="dark"] .c-blue  .kw{background:#0C447C;color:#B5D4F4}

// ─── Theme toggle ────────────────────────────────────────────────────────────
function applyTheme(t){
  const r=document.documentElement;
  const sysDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const dark = t==='dark' || (t!=='light' && sysDark);
  r.setAttribute('data-theme', dark?'dark':'light');
  const b=document.getElementById('themeTog'); if(b) b.textContent = dark?'☀️':'🌙';
}
function toggleTheme(){
  const sysDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const cur=localStorage.getItem('theme') || (sysDark?'dark':'light');
  const next=cur==='dark'?'light':'dark';
  localStorage.setItem('theme',next); applyTheme(next);
}
applyTheme(localStorage.getItem('theme'));

// ─── KaTeX helper ─────────────────────────────────────────────────────────────
function K(tex){
  try{return katex.renderToString(tex,{throwOnError:false,displayMode:false});}
  catch(e){return `<code>${tex}</code>`;}
}
// ─── Fontosság + mintapélda ─────────────────────────────────────
function stars(lvl){return '★'.repeat(lvl);}
function priBadge(t){
  return t.fontos?`<span class="pri pri-${t.fontos.lvl}" style="margin-left:auto">${stars(t.fontos.lvl)}</span>`:'';
}
function priHTML(t){
  if(!t.fontos) return '';
  return `<div class="ds"><div class="dl">Vizsga-súly</div><div class="dc"><span class="pri pri-${t.fontos.lvl}">${stars(t.fontos.lvl)}</span> ${t.fontos.txt}</div></div>`;
}
function peldaHTML(t){
  if(!t.pelda) return '';
  const rows=t.pelda.sol.map(s=>`<div class="frow"><div class="fmath">${K(s)}</div></div>`).join('');
  return `<div class="ds"><div class="dl">Mintapélda</div><div class="dc" style="margin-bottom:6px">${t.pelda.q}</div><div class="fblock">${rows}</div></div>`;
}
// ─── HTML builders ────────────────────────────────────────────────────────────
function kwHTML(arr,col){
  return arr.map(k=>`<span class="kw c-${col}">${k}</span>`).join('');
}

function formulaHTML(fs){
  return fs.map(f=>`<div class="frow">
    <div class="flabel">${f.lbl}</div>
    <div class="fmath">${K(f.tex,true)}</div>
  </div>`).join('');
}

function paramsHTML(params){
  if(!params||!params.length) return '';
  const rows=params.map(p=>`<tr><td class="psym">${p.s}</td><td class="pdesc">${p.d}</td></tr>`).join('');
  return `<div class="ds"><div class="dl">Paraméterek</div><table class="ptable">${rows}</table></div>`;
}

function detailHTML(t){
  const dc=DC[t.col]||'#888';
  return `
  <div class="ds"><div class="dl">Lényeg</div><div class="dc">${t.lenyeg}</div></div>
  ${priHTML(t)}
  <div class="ds"><div class="dl">Kulcsszavak</div><div class="kwr">${kwHTML(t.kws,t.col)}</div></div>
  <div class="ds"><div class="dl">Képletek</div><div class="fblock">${formulaHTML(t.formulas)}</div></div>
  ${paramsHTML(t.params)}
  ${peldaHTML(t)}
  <div class="d2">
    <div>
      <div class="ds"><div class="dl">Buktatók</div>
        <ul class="blist">${t.buk.map(b=>`<li>${b}</li>`).join('')}</ul>
      </div>
    </div>
    <div>
      <div class="ds"><div class="dl">Összefüggés más típusokkal</div><div class="dc">${t.kap}</div></div>
      <div class="ds" style="margin-top:10px"><div class="dl">Memória-hook</div>
        <div class="hook c-${t.col}" style="border-color:${dc}">${t.hook}</div>
      </div>
    </div>
  </div>`;
}

// ─── Quick grid ───────────────────────────────────────────────────────────────
function buildQuick(){
  let h='';
  for(const cat of CATS){
    const items=T.filter(t=>t.cat===cat.id);
    if(!items.length) continue;
    h+=`<div class="catgrp"><div class="cat">▸ ${cat.lbl}</div><div class="qgrid">`;
    for(const t of items){
      const s=(t.name+' '+t.kws.join(' ')+' '+t.trap).replace(/<[^>]+>/g,'').replace(/"/g,'').toLowerCase();
      h+=`<div class="qcard" data-s="${s}" onclick="openMo('${t.id}')">
        <div class="qhead c-${t.col}"><div class="dot c-${t.col}"></div>${t.name}${priBadge(t)}</div>
        <div class="qbody">
          <div class="kwr">${kwHTML(t.kws.slice(0,4),t.col)}</div>
          <div class="trap">⚠️ ${t.trap}</div>
        </div>
      </div>`;
    }
    h+='</div></div>';
  }
  h+='<p class="hint" id="noRes" style="display:none">Nincs találat erre a kulcsszóra 🤷</p>';
  h+='<p class="hint">Kattints egy kártyára a részletekért ↗</p>';
  document.getElementById('pgGrid').innerHTML=h;
}

function filt(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  let visible=0;
  document.querySelectorAll('#pgGrid .qcard').forEach(c=>{
    const ok=!q||c.dataset.s.includes(q);
    c.style.display=ok?'':'none';
    if(ok) visible++;
  });
  document.querySelectorAll('#pgGrid .catgrp').forEach(g=>{
    const any=[...g.querySelectorAll('.qcard')].some(c=>c.style.display!=='none');
    g.style.display=any?'':'none';
  });
  const nr=document.getElementById('noRes');
  if(nr) nr.style.display=visible?'none':'';
}

// ─── Accordion ────────────────────────────────────────────────────────────────
function buildAcc(){
  let h='';
  for(const t of T){
    h+=`<div class="aitm" id="a-${t.id}">
      <div class="ahead c-${t.col}" onclick="togAcc(this)">
        <div class="dot c-${t.col}"></div>${t.name}<span class="chv">▶</span>
      </div>
      <div class="abody">${detailHTML(t)}</div>
    </div>`;
  }
  document.getElementById('pr').innerHTML=h;
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openMo(id){
  const t=T.find(x=>x.id===id);
  if(!t) return;
  const mh=document.getElementById('mh');
  mh.className=`mhead c-${t.col}`;
  mh.innerHTML=`<div class="dot c-${t.col}" style="width:12px;height:12px;flex-shrink:0"></div>${t.name}`;
  document.getElementById('mb').innerHTML=detailHTML(t);
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeMo(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
const PANES={gyors:'pg',felismero:'pf',parok:'pp',kviz:'pk',tabla:'pt',reszletes:'pr',tanul:'pu'};
function sw(name){
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.pane===name));
  document.querySelectorAll('.pane').forEach(el=>el.classList.toggle('active',el.id===PANES[name]));
}

function togAcc(head){head.parentElement.classList.toggle('open');}

let treePath=[];
function buildTree(){treePath=[{node:TREE,label:null}];renderTree();}
function treeReset(){buildTree();}
function treeBack(){if(treePath.length>1){treePath.pop();renderTree();}}
function treeGo(i){
  const cur=treePath[treePath.length-1].node;
  const opt=cur.opts[i];
  treePath.push({node:opt.res?{res:opt.res}:opt.go,label:opt.t});
  renderTree();
}
function renderTree(){
  const cur=treePath[treePath.length-1].node;
  const crumbs=treePath.slice(1).map(p=>p.label).join(' › ');
  const ctrl=`<div class="tctrl">
    <button class="tbtn" onclick="treeReset()">↺ Újrakezdés</button>
    ${treePath.length>1?'<button class="tbtn" onclick="treeBack()">← Vissza</button>':''}
    <span class="tcrumb">${crumbs||'Válassz egy irányt — pár kérdés, és megvan a típus.'}</span>
  </div>`;
  let body='';
  if(cur.res){
    const t=T.find(x=>x.id===cur.res);
    body=`<div class="tres">
      <div class="rhead c-${t.col}"><div class="dot c-${t.col}"></div>${t.name}</div>
      <div class="rbody">
        <div class="dc">${t.lenyeg}</div>
        <div class="trap" style="margin-top:8px">⚠️ ${t.trap}</div>
        <div class="rbtns">
          <button class="rbtn rbtn-go" onclick="openMo('${t.id}')">Részletek + mintapélda →</button>
          <button class="rbtn rbtn-re" onclick="treeReset()">↺ Új feladat</button>
        </div>
      </div>
    </div>`;
  }else{
    body=`<div class="tq">${cur.q}</div>`;
    body+=cur.opts.map((o,i)=>`<button class="topt" onclick="treeGo(${i})">${o.t}</button>`).join('');
  }
  document.getElementById('pf').innerHTML=`<div class="tree">${ctrl}${body}</div>`;
}

let qzOrder=[],qzIdx=0,qzScore=0,qzAns=false,qzOpts=[],qzChoice=null;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function loadQ(){if(qzIdx<qzOrder.length)qzOpts=shuffle(QUIZ[qzOrder[qzIdx]].opts);qzAns=false;qzChoice=null;}
function buildQuiz(){qzOrder=shuffle(QUIZ.map((_,i)=>i));qzIdx=0;qzScore=0;loadQ();renderQuiz();}
function quizReset(){buildQuiz();}
function quizNext(){qzIdx++;loadQ();renderQuiz();}
function quizAnswer(choice){if(qzAns)return;qzAns=true;qzChoice=choice;if(choice===QUIZ[qzOrder[qzIdx]].id)qzScore++;renderQuiz();}
function renderQuiz(){
  const pk=document.getElementById('pk');
  if(qzIdx>=qzOrder.length){
    const pct=Math.round(qzScore/qzOrder.length*100);
    const msg=pct>=80?'kiváló! 🎯':pct>=50?'jó úton vagy 💪':'gyakorolj még 📚';
    pk.innerHTML=`<div class="quiz"><div class="qzdone">
      <div class="qzprog">Vége! Eredmény:</div>
      <div class="big">${qzScore} / ${qzOrder.length}</div>
      <div class="qzprog">${pct}% — ${msg}</div>
      <div class="qzbtns" style="justify-content:center;margin-top:14px"><button class="rbtn rbtn-go" onclick="quizReset()">↺ Új kör</button></div>
    </div></div>`;
    return;
  }
  const item=QUIZ[qzOrder[qzIdx]];
  const nm=id=>T.find(x=>x.id===id).name;
  let opts='';
  for(const id of qzOpts){
    let cls='qzopt';
    if(qzAns){if(id===item.id)cls+=' ok';else if(id===qzChoice)cls+=' bad';}
    opts+=`<button class="${cls}" ${qzAns?'disabled':''} onclick="quizAnswer('${id}')">${nm(id)}</button>`;
  }
  let fb='';
  if(qzAns){
    const good=qzChoice===item.id;
    fb=`<div class="qzfb ${good?'good':'wrong'}">${good?'✅ Helyes! ':'❌ Nem talált. A helyes válasz: <b>'+nm(item.id)+'</b>. '}${item.why}</div>
    <div class="qzbtns">
      <button class="rbtn rbtn-re" onclick="openMo('${item.id}')">Részletek + mintapélda →</button>
      <button class="rbtn rbtn-go" onclick="quizNext()">${qzIdx+1<qzOrder.length?'Következő →':'Eredmény →'}</button>
    </div>`;
  }
  pk.innerHTML=`<div class="quiz">
    <div class="qztop"><span class="qzprog">${qzIdx+1} / ${qzOrder.length} kérdés</span><span class="qzscore">Pont: ${qzScore}</span></div>
    <div class="qzq"><div class="qzlabel">Melyik típusú ez a feladat?</div>${item.q}</div>
    ${opts}${fb}
  </div>`;
}

  h+=`<div class="lp-h">🔑 2. Felismerő szótár — a kulcsszó dönt</div>`;
  h+=`<div class="lp-card" style="padding:8px 10px">`;
  h+=`<p style="font-size:11.5px;color:var(--text2);margin-bottom:8px;line-height:1.5">A feladat szövegében szinte mindig van egy <b>árulkodó szókapcsolat</b>. Ezt kösd a típushoz — a képlet már másodlagos. Kattints egy sorra a részletekért.</p>`;
  for(const c of CUES){
    h+=`<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin:10px 0 4px">${c.grp}</div>`;
    for(const r of c.rows){
      const t=T.find(x=>x.id===r.id);
      h+=`<div class="lp-cue" onclick="openMo('${r.id}')">
        <span class="lp-cue-kw">„${r.kw}”</span>
        <span class="lp-cue-arr">→</span>
        <span class="lp-cue-t"><span class="dot c-${t.col}"></span>${r.t}</span>
      </div>`;
    }
  }
  h+=`</div>`;

  // 3. Összekeverhető párok — a 3 leghírhedtebb
  h+=`<div class="lp-h">⚠️ 3. A 3 leggyakoribb csapda — egy mondatban</div>`;
  h+=`<div class="lp-card">
    <div class="lp-step"><div class="lp-num" style="background:#D85A30">P/E</div><div><b>Poisson = darab, Exponenciális = idő.</b> Ugyanaz a folyamat: Poisson „hány esemény", Exponenciális „mennyi idő köztük". λ = 1/E(X)!</div></div>
    <div class="lp-step"><div class="lp-num" style="background:#3D5DB0">±√n</div><div><b>Összegnél σ√n, átlagnál σ/√n.</b> CHT: Sₙ-nél szorzol, X̄-nál osztasz — ne cseréld fel.</div></div>
    <div class="lp-step"><div class="lp-num" style="background:#D94060">Φ−</div><div><b>Negatív z-nél: 1 mínusz.</b> Φ(−x) = 1 − Φ(x) — a Φ-tábla csak pozitív értékeket ad.</div></div>
  </div><button class="lp-btn" onclick="sw('parok')">🔀 Több összekeverhető pár →</button>`;

  // 2. FKKB
  h+=`<div class="lp-h">🃏 4. Minden típusra ugyanaz a 4 kártya — „FKKB”</div>`;
  h+=`<div class="lp-card">
    <div class="lp-step"><div class="lp-num">F</div><div><b>Felismerés</b> — 2-3 kulcsszó, amitől beugrik (pl. „visszatevéssel” → Binomiális).</div></div>
    <div class="lp-step"><div class="lp-num">K</div><div><b>Képlet</b> — az 1 fő képlet, semmi több először.</div></div>
    <div class="lp-step"><div class="lp-num">K</div><div><b>Kata (recept)</b> — a lépések sorrendje.</div></div>
    <div class="lp-step"><div class="lp-num">B</div><div><b>Bukta</b> — az 1 tipikus csapda (pl. Φ(−x)=1−Φ(x)).</div></div>
  </div><button class="lp-btn" onclick="sw('reszletes')">📖 Minden típusnál ott az FKKB →</button>`;

  // 3. Hurok
  h+=`<div class="lp-h">🔁 5. A tanulási hurok — minden ülés ugyanígy (~30-40 perc)</div>`;
  h+=`<div class="lp-card">
    <div class="lp-step"><div class="lp-num">1</div><div><b>Bemelegítés (2 perc):</b> végigkattintod a Felismerő fát, <i>hangosan</i> megnevezed a típust.</div></div>
    <div class="lp-step"><div class="lp-num">2</div><div><b>1 új típus mélyen:</b> elolvasod az FKKB kártyát + <b>kézzel</b> megoldod a mintapéldáját.</div></div>
    <div class="lp-step"><div class="lp-num">3</div><div><b>Aktív felidézés:</b> Kvíz a <i>már tanult</i> típusokra — nem olvasol, felidézel!</div></div>
    <div class="lp-step"><div class="lp-num">4</div><div><b>Hibajavítás:</b> amit elrontasz, 1 mondatban felírod magadnak.</div></div>
  </div><button class="lp-btn" onclick="sw('kviz')">🎯 Ugorj a Kvízre →</button>`;

  // 4. Ütemterv
  h+=`<div class="lp-h">📅 6. Ütemterv (példa, 2 hét)</div>`;
  h+=`<table class="lp-tbl"><tr><th>Napok</th><th>Mit</th></tr>
    <tr><td>1–3.</td><td>A 3 ⭐⭐⭐ <b>mag</b> (Normális, Hipotézisvizsgálat, CHT…)</td></tr>
    <tr><td>4–7.</td><td>A ⭐⭐ <b>gyakori</b> típusok</td></tr>
    <tr><td>8–10.</td><td>A ⭐ <b>ráadás</b> típusok</td></tr>
    <tr><td>11–14.</td><td>Vegyes <b>Kvíz</b> + régi vizsgák, gyenge pontok pótlása</td></tr>
  </table>`;

  // 5. Checklist
  h+=`<div class="lp-h">✅ 7. Haladáskövető</div>`;
  h+=`<div class="lp-card"><div class="lp-bar"><i id="lpBar"></i></div><div class="lp-prog" id="lpProg"></div></div>`;
  for(const L of LAYERS){
    const items=T.filter(t=>(t.fontos?t.fontos.lvl:0)===L.lvl);
    if(!items.length) continue;
    h+=`<div class="lp-h" style="font-size:12px;margin:14px 0 6px">${L.t} <span style="font-weight:500;text-transform:none;letter-spacing:0">— ${L.d}</span></div>`;
    for(const t of items){
      const dn=p[t.id]?' done':'';
      h+=`<div class="lp-row${dn}" id="lprow-${t.id}">
        <input type="checkbox" ${p[t.id]?'checked':''} onchange="togDone('${t.id}')" aria-label="Kész">
        <span class="lp-name" onclick="openMo('${t.id}')">${t.name}</span>
        <span class="pri pri-${t.fontos.lvl}">${stars(t.fontos.lvl)}</span>
      </div>`;
    }
  }
  h+=`<p class="hint">A pipák a böngésződben mentődnek (localStorage) — újratöltés után is megmaradnak.</p>`;

  document.getElementById('pu').innerHTML=h;
  renderProg();
}

// ─── Init ───────────────────────────────────────────────
buildQuick();
buildAcc();
buildTree();
buildPairs();
buildQuiz();
buildTabla();
buildTanulas();
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMo();});
</script>
</body>
</html>
